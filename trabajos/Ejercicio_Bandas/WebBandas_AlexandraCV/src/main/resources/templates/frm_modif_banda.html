<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Disco Stu</title>
	<link rel="stylesheet" href="styles/styles.css">
</head>

<body>

	<header th:include="plantillas.html::cabecera"></header>

	<nav th:include="plantillas.html::menu"></nav>

	<main>
		<section>
			<h1 th:text="${mensaje}"></h1>

			<form th:action="@{/ModificarBanda}" method="POST" th:object="${obj_banda}">
				<input type="hidden" th:field="*{id}" readonly />
				
				<div class="campo">
				        <label>Nombre de la banda:</label>
				        <input type="text" th:field="*{nombre}" required>
				    </div>

				    <div class="campo">
				        <label>Número de integrantes:</label>
				        <input type="number" th:field="*{numIntegrantes}" min="1" required>
				    </div>

				    <div class="campo">
				        <label>Estilo musical:</label>
				        <select th:field="*{estilo.id}" required>
				            <option th:each="elem : ${listaEstilos}"
				                    th:value="${elem.id}"
				                    th:text="${elem.nombre}">
				            </option>
				        </select>
				    </div>

				    <div class="campo">
				        <label>País de origen:</label>
				        <select th:field="*{pais.id}" required>
				            <option th:each="elem : ${listaPaises}"
				                    th:value="${elem.id}"
				                    th:text="${elem.nombre}">
				            </option>
				        </select>
						<br>
						<input type="submit" value="Agregar país" th:formaction="@{/AgregarPaisCV}">
				    </div>

					
					<input type="text" name="origen" value="frm_modif_banda" hidden required>
				    <input type="submit" value="Modificar Banda">
			</form>
		</section>
	</main>

	<footer th:include="plantillas.html::pie"></footer>
</body>

</html>
