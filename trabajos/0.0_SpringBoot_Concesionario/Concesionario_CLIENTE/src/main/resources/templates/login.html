<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Concesionario Caster</title>
	<link rel="stylesheet" href="styles/styles.css">
	<link rel="stylesheet" href="styles/login.css">
	<!--	<script src="js/hashearPass.js"></script>-->
</head>

<body>
	<header th:include="plantillas/plantillas.html::cabecera"></header>



	<main id="mainSinMenu">
		<section id="sectionSinMenu">
			<div class="login-box">
				<h2>Iniciar sesión</h2>

				<form th:action="@{/login}" method="post">

					<div class="form-group">
						<input type="text" name="user" placeholder="Usuario" required>
					</div>

					<div class="form-group">
						<input type="password" name="pass" placeholder="Contraseña" required></input>
						<br>

						<!--				<input type="hidden" th:field="*{pass}" value=""></input>-->

					</div>

					<input type="submit" value="Entrar">

					<p th:if="${error}" th:text="${error}" style="color:red;"></p>
				</form>
			</div>


		</section>
	</main>

	<footer th:include="plantillas/plantillas.html::pie"></footer>
</body>

</html>
