<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Concesionario Caster</title>
	<link rel="stylesheet" href="styles/styles.css">
	<link rel="stylesheet" href="styles/usuarios.css">

	<!--	<script src="js/hashearPass.js"></script>-->
</head>

<body>
	<header th:include="plantillas/plantillas.html::cabecera"></header>

	<nav th:include="plantillas/plantillas.html::menu"></nav>

	<main>
		<br>
		<h1>Gestión de Usuarios</h1>

		<!--		FORMULARIO INSERTAR		-->
		<h2>Nuevo usuario</h2>

		<form th:action="@{/InsertarUsuario}" method="post" th:object="${obj_usuario}">

			<div class="form-group">
				<label>Nombre:</label>
				<input type="text" th:field="*{user}" required>
			</div>

			<div class="form-group">
				<label>Rol:</label>
				<select th:field="*{role.id}" required>
					<option th:each="lr : ${listaRoles}" th:value="${lr.id}" th:text="${lr.nombre}">
					</option>
				</select>
			</div>

			<div class="form-group">
				<label>Contraseña:</label>
				<input type="password" th:field="*{pass}" required>
			</div>

			<button type="submit">Guardar</button>

		</form>

		<hr>


		<!--		TABLA MOSTRAR		-->

		<h2>Listado de marcas</h2>

		<table border="1">
			<thead>
				<tr>
					<!--					<th>ID</th>-->
					<th>Nombre</th>
					<th>Rol</th>
					<th>Acciones</th>
				</tr>
			</thead>


			<tbody>
				<tr th:each="lu : ${listaUsuarios}">
					<!--					<td th:text="${lu.id}"></td>-->
					<td th:text="${lu.user}"></td>
					<td th:text="${lu.role.nombre}"></td>
					<td>
						<!--						MODIFICAR						-->
						<a th:href="@{/ModificarUsuario(id=${lu.id})}">
							Modificar
						</a>

						<!--						ELIMINAR						-->
						<a th:href="@{/EliminarUsuario(id=${lu.id})}"
							onclick="return confirm('¿Seguro que quieres eliminar este usuario?')">
							Eliminar
						</a>
					</td>
				</tr>
			</tbody>
		</table>

	</main>

	<footer th:include="plantillas/plantillas.html::pie"></footer>
</body>

</html>
